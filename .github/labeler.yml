# actions/labeler v5 配置：按 PR changed-files 路径打 area:* label。
# 仅基于文件路径列表（actions/labeler 不 checkout / 不执行 PR 代码，pull_request_target 下安全）。
"area:runtime":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lib/claude-client.ts"
          - "src/lib/runtime/**"
          - "src/lib/codex/**"
          - "src/lib/stream-session-manager.ts"
"area:db":
  - changed-files:
      - any-glob-to-any-file:
          - "src/lib/db.ts"
          - "src/types/index.ts"
"area:api":
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/**"
"area:ui":
  - changed-files:
      - any-glob-to-any-file:
          - "src/components/**"
          - "src/app/**"
"area:electron":
  - changed-files:
      - any-glob-to-any-file:
          - "electron/**"
          - "scripts/after-pack.js"
          - "scripts/after-sign.js"
          - "scripts/build-electron*.mjs"
          - "electron-builder.yml"
"area:docs":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "*.md"
"area:tests":
  - changed-files:
      - any-glob-to-any-file:
          - "src/__tests__/**"
          - "tests/**"
"area:ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
